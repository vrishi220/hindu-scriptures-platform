name: Deploy Frontend (Vercel)

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vercel-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Set build metadata
        run: |
          if ! [[ "${GITHUB_RUN_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "GITHUB_RUN_NUMBER is missing or invalid"
            exit 1
          fi
          echo "NEXT_PUBLIC_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_APP_VERSION=$(node -p \"require('./package.json').version\")" >> "$GITHUB_ENV"

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build frontend
        env:
          NEXT_PUBLIC_BUILD_NUMBER: ${{ env.NEXT_PUBLIC_BUILD_NUMBER }}
          NEXT_PUBLIC_GIT_SHA: ${{ env.NEXT_PUBLIC_GIT_SHA }}
          NEXT_PUBLIC_APP_VERSION: ${{ env.NEXT_PUBLIC_APP_VERSION }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
