name: Deploy Frontend (Vercel)

# Deployment policy:
# - Trigger production deploys from this workflow only (workflow_dispatch).
# - Keep Vercel Git auto-deploy disabled (or use an ignored build step) to avoid duplicate deploy paths.
# - Do not set a static NEXT_PUBLIC_BUILD_NUMBER in Vercel project env; this workflow injects it from GITHUB_RUN_NUMBER.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to deploy"
        required: false
        default: "main"

concurrency:
  group: deploy-vercel-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID_SECRET: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID_SECRET: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Clean up any stale Vercel configs
        run: rm -rf web/.vercel .vercel .vercelignore || true

      - name: Validate Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID_SECRET" ]; then
            echo "Missing required secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID_SECRET" ]; then
            echo "Missing required secret: VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Export Vercel identifiers
        run: |
          if ! [[ "$VERCEL_ORG_ID_SECRET" =~ ^team_[A-Za-z0-9]+$ ]]; then
            echo "Invalid VERCEL_ORG_ID format; expected value like team_xxx"
            exit 1
          fi
          if ! [[ "$VERCEL_PROJECT_ID_SECRET" =~ ^prj_[A-Za-z0-9]+$ ]]; then
            echo "Invalid VERCEL_PROJECT_ID format; expected value like prj_xxx"
            exit 1
          fi
          echo "VERCEL_ORG_ID=$VERCEL_ORG_ID_SECRET" >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_SECRET" >> "$GITHUB_ENV"

      - name: Write Vercel project link (web)
        run: |
          mkdir -p web/.vercel
          cat > web/.vercel/project.json <<EOF
          {
            "orgId": "${VERCEL_ORG_ID}",
            "projectId": "${VERCEL_PROJECT_ID}"
          }
          EOF

      - name: Install dependencies
        run: npm install --prefix web --no-audit --no-fund

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Verify Vercel token and project access
        run: |
          echo "Diagnostic: Resolved Vercel IDs"
          echo "  VERCEL_ORG_ID: ${VERCEL_ORG_ID:0:10}****"
          echo "  VERCEL_PROJECT_ID: ${VERCEL_PROJECT_ID:0:10}****"
          echo "  VERCEL_TOKEN: ${VERCEL_TOKEN:0:10}****"
          echo ""
          echo "Contents of web/.vercel/project.json:"
          cat web/.vercel/project.json
          echo ""
          echo "Running vercel whoami to validate token..."
          vercel whoami --token="$VERCEL_TOKEN" || true

      - name: Preflight Vercel API authorization
        run: |
          TEAM_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/teams/$VERCEL_ORG_ID")

          PROJECT_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID")

          echo "Vercel API auth check: team=$TEAM_STATUS project=$PROJECT_STATUS"

          if [ "$TEAM_STATUS" = "403" ] || [ "$PROJECT_STATUS" = "403" ]; then
            echo "403 from Vercel API: token lacks access to the configured team/project, or VERCEL_ORG_ID/VERCEL_PROJECT_ID are incorrect."
            echo "Update GitHub secrets VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID to values from the same Vercel account/team."
            exit 1
          fi

          if [ "$TEAM_STATUS" -ge 400 ] || [ "$PROJECT_STATUS" -ge 400 ]; then
            echo "Unexpected Vercel API response (team=$TEAM_STATUS project=$PROJECT_STATUS)."
            exit 1
          fi

      - name: Validate run number
        run: |
          if ! [[ "${GITHUB_RUN_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "GITHUB_RUN_NUMBER is missing or invalid"
            exit 1
          fi

      - name: Pull Vercel environment
        run: |
          VERCEL_ORG_ID="$VERCEL_ORG_ID" \
          VERCEL_PROJECT_ID="$VERCEL_PROJECT_ID" \
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd web --debug

      - name: Build frontend
        run: |
          APP_VERSION=$(node -p "require('./web/package.json').version")
          echo "Building with NEXT_PUBLIC_BUILD_NUMBER=${GITHUB_RUN_NUMBER}"
          NEXT_PUBLIC_BUILD_NUMBER="${GITHUB_RUN_NUMBER}" \
          NEXT_PUBLIC_GIT_SHA="${GITHUB_SHA}" \
          NEXT_PUBLIC_APP_VERSION="${APP_VERSION}" \
          VERCEL_ORG_ID="$VERCEL_ORG_ID" \
          VERCEL_PROJECT_ID="$VERCEL_PROJECT_ID" \
          vercel build --prod --token="$VERCEL_TOKEN" --cwd web

      - name: Deploy frontend
        run: |
          set +e
          DEPLOY_OUTPUT=$(VERCEL_ORG_ID="$VERCEL_ORG_ID" VERCEL_PROJECT_ID="$VERCEL_PROJECT_ID" vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN" --cwd web 2>&1)
          DEPLOY_EXIT=$?
          echo "$DEPLOY_OUTPUT"

          if [ "$DEPLOY_EXIT" -eq 0 ]; then
            exit 0
          fi

          if echo "$DEPLOY_OUTPUT" | grep -q "api-upload-free"; then
            echo "::warning::Vercel free-tier upload limit reached. Deployment skipped; retry after cooldown window."
            exit 0
          fi

          exit "$DEPLOY_EXIT"
