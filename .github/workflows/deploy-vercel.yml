name: Deploy Frontend (Vercel)

# Deployment policy:
# - Trigger production deploys from this workflow only (workflow_dispatch).
# - Keep Vercel Git auto-deploy disabled (or use an ignored build step) to avoid duplicate deploy paths.
# - Do not set a static NEXT_PUBLIC_BUILD_NUMBER in Vercel project env; this workflow injects it from GITHUB_RUN_NUMBER.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to deploy"
        required: false
        default: "main"

concurrency:
  group: deploy-vercel-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Validate Vercel secrets
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required secret: VERCEL_TOKEN"
            missing=1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required secret: VERCEL_ORG_ID"
            missing=1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required secret: VERCEL_PROJECT_ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install --prefix web --no-audit --no-fund

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Validate run number
        run: |
          if ! [[ "${GITHUB_RUN_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "GITHUB_RUN_NUMBER is missing or invalid"
            exit 1
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build frontend
        run: |
          APP_VERSION=$(node -p "require('./web/package.json').version")
          echo "Building with NEXT_PUBLIC_BUILD_NUMBER=${GITHUB_RUN_NUMBER}"
          NEXT_PUBLIC_BUILD_NUMBER="${GITHUB_RUN_NUMBER}" \
          NEXT_PUBLIC_GIT_SHA="${GITHUB_SHA}" \
          NEXT_PUBLIC_APP_VERSION="${APP_VERSION}" \
          vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy frontend
        run: |
          set +e
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN" 2>&1)
          DEPLOY_EXIT=$?
          echo "$DEPLOY_OUTPUT"

          if [ "$DEPLOY_EXIT" -eq 0 ]; then
            exit 0
          fi

          if echo "$DEPLOY_OUTPUT" | grep -q "api-upload-free"; then
            echo "::warning::Vercel free-tier upload limit reached. Deployment skipped; retry after cooldown window."
            exit 0
          fi

          exit "$DEPLOY_EXIT"
