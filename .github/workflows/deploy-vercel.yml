name: Deploy Frontend (Vercel)

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vercel-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required secret: VERCEL_TOKEN"
            missing=1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required secret: VERCEL_ORG_ID"
            missing=1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required secret: VERCEL_PROJECT_ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install --prefix web --no-audit --no-fund

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Validate run number
        run: |
          if ! [[ "${GITHUB_RUN_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "GITHUB_RUN_NUMBER is missing or invalid"
            exit 1
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build frontend
        run: |
          APP_VERSION=$(node -p "require('./web/package.json').version")
          echo "Building with NEXT_PUBLIC_BUILD_NUMBER=${GITHUB_RUN_NUMBER}"
          NEXT_PUBLIC_BUILD_NUMBER="${GITHUB_RUN_NUMBER}" \
          NEXT_PUBLIC_GIT_SHA="${GITHUB_SHA}" \
          NEXT_PUBLIC_APP_VERSION="${APP_VERSION}" \
          vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy frontend
        run: vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN"
