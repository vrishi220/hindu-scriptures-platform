name: CI Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_scriptures
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/test_scriptures
      PSQL_URL: postgresql://postgres:postgres@localhost:5432/test_scriptures
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Load schema
        run: psql "$PSQL_URL" -f schema.sql
      - name: Run backend sanity + integration tests
        run: pytest tests/test_backend_sanity.py tests/test_phase1_backend_integration.py -v

  frontend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_scriptures
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/test_scriptures
      PSQL_URL: postgresql://postgres:postgres@localhost:5432/test_scriptures
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r ../requirements.txt
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Load schema
        run: psql "$PSQL_URL" -f ../schema.sql
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Pin npm version
        run: npm install -g npm@10.9.3
      - name: Show Node and npm versions
        run: node -v && npm -v
      - name: Set build metadata
        run: |
          echo "NEXT_PUBLIC_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run frontend tests (Chromium)
        run: npx playwright test --project=chromium --workers=1
