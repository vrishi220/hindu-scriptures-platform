services:
  # FastAPI Backend
  - type: web
    name: hindu-scriptures-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  # PostgreSQL Database
  - type: pserv
    name: hindu-scriptures-db
    env: docker
    plan: free
    region: oregon
    databaseName: scriptures_db
    databaseUser: scriptures_user
